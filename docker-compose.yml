version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scheduler-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: jobscheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d jobscheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scheduler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    container_name: scheduler-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "postgresql://root:root@postgres:5432/jobscheduler?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "super-secret-jwt-signing-key-change-in-production"
      JWT_REFRESH_SECRET: "super-secret-jwt-refresh-signing-key"
      FRONTEND_URL: "http://localhost:5173"
      STALE_WORKER_TIMEOUT_MS: 15000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Ensure migrations are pushed and seed is run before launching API
    command: >
      sh -c "npx prisma db push --schema=database/prisma/schema.prisma && npm run seed -w database && npm run start -w backend/api"

  worker:
    build:
      context: .
      dockerfile: backend/worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://root:root@postgres:5432/jobscheduler?schema=public"
      REDIS_URL: "redis://redis:6379"
      WORKER_POLL_INTERVAL_MS: 1000
      WORKER_HEARTBEAT_INTERVAL_MS: 5000
      REAPER_INTERVAL_MS: 10000
      STALE_WORKER_TIMEOUT_MS: 15000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: scheduler-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
